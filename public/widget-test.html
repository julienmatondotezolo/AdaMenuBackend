<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaMenu Widget v2 — Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .test-header {
      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      color: white;
      text-align: center;
      padding: 3rem 2rem;
    }
    .test-header h1 { font-size: 2rem; margin-bottom: .5rem; }
    .test-header p { opacity: .8; font-size: .95rem; }

    .test-controls {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 1.5rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .test-controls h3 { margin-bottom: 1rem; font-size: 1rem; color: #666; }
    .test-controls .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .test-controls label {
      display: flex;
      flex-direction: column;
      font-size: .8rem;
      font-weight: 600;
      color: #888;
      gap: .3rem;
    }
    .test-controls input, .test-controls select {
      padding: .5rem .75rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: .9rem;
      min-width: 150px;
    }
    .test-controls button {
      padding: .6rem 1.2rem;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .test-controls button:hover { background: #34495e; }

    .test-embed-code {
      max-width: 900px;
      margin: 1rem auto;
      padding: 1rem 1.5rem;
      background: #1e1e2e;
      color: #a6e3a1;
      border-radius: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .82rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .test-widget-container {
      max-width: 1100px;
      margin: 2rem auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
    }

    .section-label {
      max-width: 900px;
      margin: 2rem auto .5rem;
      font-size: .85rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
  </style>
</head>
<body>

  <div class="test-header">
    <h1>🍽️ AdaMenu Widget v2 — Test Page</h1>
    <p>Dynamic, shadow-DOM isolated, multi-tenant menu widget</p>
  </div>

  <div class="test-controls">
    <h3>⚙️ Configuration</h3>
    <div class="row">
      <label>
        Restaurant slug
        <input type="text" id="ctl-slug" value="losteria" />
      </label>
      <label>
        Default language
        <select id="ctl-lang">
          <option value="">Auto-detect</option>
          <option value="nl" selected>NL</option>
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
      </label>
      <label>
        Theme
        <select id="ctl-theme">
          <option value="light" selected>Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <label>
        Primary color
        <input type="color" id="ctl-primary" value="#861b2d" />
      </label>
      <label>
        Accent color
        <input type="color" id="ctl-accent" value="#616f42" />
      </label>
      <button onclick="reloadWidget()">Reload Widget</button>
    </div>
  </div>

  <div class="section-label">📋 Embed code</div>
  <div class="test-embed-code" id="embed-code"></div>

  <div class="section-label">🖥️ Widget preview</div>
  <div class="test-widget-container" id="widget-mount"></div>

  <div style="height:4rem"></div>

  <script>
    function generateTag() {
      var slug = document.getElementById('ctl-slug').value || 'losteria';
      var lang = document.getElementById('ctl-lang').value;
      var theme = document.getElementById('ctl-theme').value;
      var primary = document.getElementById('ctl-primary').value;
      var accent = document.getElementById('ctl-accent').value;

      var attrs = 'data-restaurant="' + slug + '"';
      if (lang) attrs += ' data-lang="' + lang + '"';
      if (theme !== 'light') attrs += ' data-theme="' + theme + '"';
      if (primary !== '#861b2d') attrs += ' data-primary-color="' + primary + '"';
      if (accent !== '#616f42') attrs += ' data-accent-color="' + accent + '"';

      return '<script src="https://ada.mindgen.app/widget.js" ' + attrs + '><\/script>';
    }

    function reloadWidget() {
      var mount = document.getElementById('widget-mount');
      mount.innerHTML = '';

      // Remove any existing widget hosts
      var existing = document.querySelectorAll('[id^="adamenu-host-"]');
      existing.forEach(function(el) { el.remove(); });

      // Update embed code display
      var tag = generateTag();
      document.getElementById('embed-code').textContent = tag;

      // Create new script tag
      var slug = document.getElementById('ctl-slug').value || 'losteria';
      var lang = document.getElementById('ctl-lang').value;
      var theme = document.getElementById('ctl-theme').value;
      var primary = document.getElementById('ctl-primary').value;
      var accent = document.getElementById('ctl-accent').value;

      var s = document.createElement('script');
      s.src = '/widget.js?' + Date.now(); // cache bust
      s.setAttribute('data-restaurant', slug);
      if (lang) s.setAttribute('data-lang', lang);
      if (theme !== 'light') s.setAttribute('data-theme', theme);
      if (primary !== '#861b2d') s.setAttribute('data-primary-color', primary);
      if (accent !== '#616f42') s.setAttribute('data-accent-color', accent);

      mount.appendChild(s);
    }

    // Initial load
    reloadWidget();
  </script>

</body>
</html>
